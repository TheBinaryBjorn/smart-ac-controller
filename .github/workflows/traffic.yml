name: fetch-repository-stats
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run-stats-job:
    runs-on: ubuntu-latest
    steps:
      - name: run-ghrs
        uses: jgehrcke/github-repo-stats@v1.4.2
        with:
          repository: TheBinaryBjorn/smart-ac-controller
          ghtoken: ${{ secrets.TRAFFIC_TOKEN }}